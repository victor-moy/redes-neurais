<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classificador de Dígitos — MLP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d1a;
      --surface:  #161628;
      --border:   #2a2a4a;
      --accent:   #7c6af7;
      --accent2:  #00d4aa;
      --text:     #e0e0f0;
      --muted:    #6b6b8a;
      --danger:   #f76a7c;
      --radius:   16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    /* ── Drawing panel ── */
    .draw-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px solid var(--border);
      background: #000;
      box-shadow: 0 0 40px rgba(124,106,247,0.15);
      transition: border-color 0.2s;
    }
    .canvas-wrapper.active { border-color: var(--accent); }

    #drawCanvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    .hint {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }
    button {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #clearBtn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #classifyBtn {
      background: linear-gradient(135deg, var(--accent), #5a4fcf);
      color: #fff;
      min-width: 140px;
    }
    #classifyBtn:hover:not(:disabled) { opacity: 0.88; }

    /* ── Result panel ── */
    .result-panel {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* Digit display */
    .digit-display {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .digit-big {
      font-size: 6rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: 90px;
      text-align: center;
      transition: all 0.25s;
    }
    .digit-big.empty { -webkit-text-fill-color: var(--border); }

    .digit-info h3 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .digit-info .conf-value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
    .conf-value.high  { color: var(--accent2); }
    .conf-value.mid   { color: #f7c26a; }
    .conf-value.low   { color: var(--danger); }

    /* Bars */
    .bars-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .bar-label {
      font-size: 0.9rem;
      font-weight: 700;
      width: 18px;
      text-align: center;
      color: var(--muted);
      transition: color 0.25s;
    }
    .bar-label.winner { color: var(--accent2); }
    .bar-track {
      flex: 1;
      height: 10px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      background: var(--border);
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
      width: 0;
    }
    .bar-fill.winner { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .bar-pct {
      font-size: 0.78rem;
      width: 42px;
      text-align: right;
      color: var(--muted);
    }

    /* Preview 28×28 */
    .preview-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .preview-wrap canvas {
      image-rendering: pixelated;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .preview-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    /* spinner */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* status bar */
    #status {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      transition: color 0.2s;
    }
    #status.error { color: var(--danger); }
    #status.ok    { color: var(--accent2); }

    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .digit-big { font-size: 4rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Classificador de Dígitos Manuscritos</h1>
  <p>Rede Neural MLP treinada no MNIST &mdash; desenhe um dígito e classifique!</p>
</header>

<div class="layout">

  <!-- Drawing side -->
  <div class="draw-panel">
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="drawCanvas" width="280" height="280"></canvas>
    </div>
    <p class="hint">Desenhe um dígito (0–9) &nbsp;·&nbsp; Espaço = classificar &nbsp;·&nbsp; Esc = limpar</p>
    <div class="btn-row">
      <button id="clearBtn">Limpar</button>
      <button id="classifyBtn">
        <span id="btnLabel">Classificar</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Result side -->
  <div class="result-panel">

    <div class="card">
      <div class="digit-display">
        <div class="digit-big empty" id="digitDisplay">?</div>
        <div class="digit-info">
          <h3>Confiança</h3>
          <div class="conf-value" id="confDisplay">—</div>
          <div id="previewWrap" class="preview-wrap" style="margin-top:14px; display:none">
            <canvas id="previewCanvas" width="56" height="56" title="O que o modelo vê (28×28)"></canvas>
            <span class="preview-desc">Imagem 28×28<br>enviada ao modelo</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="bars-title">Probabilidades por classe</div>
      <div id="barsContainer">
        <!-- generated by JS -->
      </div>
    </div>

  </div>
</div>

<script>
// ── canvas drawing ────────────────────────────────────────────────────────────
const canvas  = document.getElementById('drawCanvas');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('canvasWrapper');

ctx.fillStyle = '#000';
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.lineWidth   = 20;
ctx.lineCap     = 'round';
ctx.lineJoin    = 'round';
ctx.strokeStyle = '#ffffff';

let drawing = false;
let lastX = 0, lastY = 0;
let hasDrawing = false;

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - r.left, src.clientY - r.top];
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  [lastX, lastY] = getPos(e);
  ctx.beginPath();
  ctx.arc(lastX, lastY, ctx.lineWidth / 2, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  hasDrawing = true;
  wrapper.classList.add('active');
}

function draw(e) {
  if (!drawing) return;
  e.preventDefault();
  const [x, y] = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  lastX = x; lastY = y;
}

function stopDraw() {
  drawing = false;
  wrapper.classList.remove('active');
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  draw);
canvas.addEventListener('mouseup',    stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove',  draw,      { passive: false });
canvas.addEventListener('touchend',   stopDraw);

// ── bars setup ────────────────────────────────────────────────────────────────
const barsContainer = document.getElementById('barsContainer');
const barFills  = [];
const barLabels = [];
const barPcts   = [];

for (let i = 0; i < 10; i++) {
  const row = document.createElement('div');
  row.className = 'bar-row';

  const lbl = document.createElement('div');
  lbl.className = 'bar-label';
  lbl.textContent = i;

  const track = document.createElement('div');
  track.className = 'bar-track';

  const fill = document.createElement('div');
  fill.className = 'bar-fill';
  track.appendChild(fill);

  const pct = document.createElement('div');
  pct.className = 'bar-pct';
  pct.textContent = '0%';

  row.append(lbl, track, pct);
  barsContainer.appendChild(row);

  barFills.push(fill);
  barLabels.push(lbl);
  barPcts.push(pct);
}

// ── preprocessing: extract 28×28 of the drawn digit ──────────────────────────
function extractDigitCanvas() {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data    = imgData.data;
  const W = canvas.width, H = canvas.height;

  let minX = W, minY = H, maxX = 0, maxY = 0;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      if (data[i] > 20 || data[i+1] > 20 || data[i+2] > 20) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }

  if (minX > maxX) return null; // blank

  // square crop with padding
  const pad  = Math.max(8, Math.round(0.12 * Math.max(maxX - minX, maxY - minY)));
  const x0   = Math.max(0, minX - pad);
  const y0   = Math.max(0, minY - pad);
  const x1   = Math.min(W - 1, maxX + pad);
  const y1   = Math.min(H - 1, maxY + pad);
  const side = Math.max(x1 - x0, y1 - y0);

  const tmp  = document.createElement('canvas');
  tmp.width  = 28;
  tmp.height = 28;
  const tctx = tmp.getContext('2d');
  tctx.fillStyle = '#000';
  tctx.fillRect(0, 0, 28, 28);

  // center crop within a square
  const cx   = x0 + (x1 - x0) / 2;
  const cy   = y0 + (y1 - y0) / 2;
  const half = side / 2;
  tctx.drawImage(canvas,
    cx - half, cy - half, side, side,
    0, 0, 28, 28
  );
  return tmp;
}

// ── UI update ─────────────────────────────────────────────────────────────────
function updateUI(data) {
  const { digit, confidence, probabilities } = data;

  const dEl = document.getElementById('digitDisplay');
  dEl.textContent = digit;
  dEl.classList.remove('empty');

  const cEl = document.getElementById('confDisplay');
  const pct = (confidence * 100).toFixed(1) + '%';
  cEl.textContent = pct;
  cEl.className = 'conf-value ' + (confidence > 0.9 ? 'high' : confidence > 0.6 ? 'mid' : 'low');

  probabilities.forEach((p, i) => {
    const winner = i === digit;
    barFills[i].style.width = (p * 100).toFixed(1) + '%';
    barFills[i].className  = 'bar-fill' + (winner ? ' winner' : '');
    barLabels[i].className = 'bar-label' + (winner ? ' winner' : '');
    barPcts[i].textContent = (p * 100).toFixed(1) + '%';
  });
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

// ── classify ──────────────────────────────────────────────────────────────────
async function classify() {
  if (!hasDrawing) { setStatus('Desenhe um dígito primeiro!', 'error'); return; }

  const btn     = document.getElementById('classifyBtn');
  const lbl     = document.getElementById('btnLabel');
  const spinner = document.getElementById('spinner');

  btn.disabled    = true;
  lbl.style.display  = 'none';
  spinner.style.display = 'block';
  setStatus('Classificando…');

  // show 28×28 preview
  const small = extractDigitCanvas();
  const prevWrap = document.getElementById('previewWrap');
  const prevCanvas = document.getElementById('previewCanvas');
  if (small) {
    prevWrap.style.display = 'flex';
    const pctx = prevCanvas.getContext('2d');
    pctx.clearRect(0, 0, 56, 56);
    pctx.drawImage(small, 0, 0, 56, 56);
    pctx.imageSmoothingEnabled = false;
  }

  try {
    const imageData = canvas.toDataURL('image/png');
    const res  = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || res.statusText);
    }

    const data = await res.json();
    updateUI(data);
    setStatus('Classificado com sucesso!', 'ok');
  } catch (e) {
    setStatus('Erro: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    lbl.style.display  = '';
    spinner.style.display = 'none';
  }
}

// ── controls ──────────────────────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  hasDrawing = false;

  document.getElementById('digitDisplay').textContent = '?';
  document.getElementById('digitDisplay').classList.add('empty');
  document.getElementById('confDisplay').textContent = '—';
  document.getElementById('confDisplay').className = 'conf-value';
  document.getElementById('previewWrap').style.display = 'none';

  barFills.forEach(f  => { f.style.width = '0'; f.className = 'bar-fill'; });
  barLabels.forEach(l => { l.className = 'bar-label'; });
  barPcts.forEach(p   => { p.textContent = '0%'; });

  setStatus('');
});

document.getElementById('classifyBtn').addEventListener('click', classify);

document.addEventListener('keydown', e => {
  if (e.code === 'Space')  { e.preventDefault(); classify(); }
  if (e.code === 'Escape') { document.getElementById('clearBtn').click(); }
});

// ── health check on load ──────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    if (!d.model_loaded) {
      setStatus('⚠ Modelo não treinado. Execute: python train.py', 'error');
      document.getElementById('classifyBtn').disabled = true;
    }
  } catch (_) {}
})();
</script>
</body>
</html>
